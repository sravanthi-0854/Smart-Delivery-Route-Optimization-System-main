<!DOCTYPE html>
<html>
<head>
    <title>Route Optimization</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>

        body{
            margin:0;
            background:#0f0f0f;
            color:white;
            font-family:Arial,sans-serif;
        }

        .sidebar{
            width:250px;
            height:100vh;
            background:#000;
            position:fixed;
            left:0;
            top:0;
            padding-top:20px;
        }

        .sidebar h3{
            color:white;
            text-align:center;
            margin-bottom:30px;
        }

        .sidebar a{
            display:block;
            color:#ddd;
            padding:15px;
            text-decoration:none;
        }

        .sidebar a:hover{
            background:#222;
            color:white;
        }

        .content{
            margin-left:270px;
            padding:20px;
        }

        .card{
            background:#1a1a1a;
            color:white;
            border:none;
            border-radius:15px;
        }

        .btn-black{
            background:black;
            color:white;
            border:none;
            padding:10px 20px;
        }

        .btn-black:hover{
            background:#333;
            color:white;
        }

        .stat-card{
            text-align:center;
            padding:20px;
            background:#111;
            border-radius:15px;
        }

        .stat-card h2{
            color:#00d4ff;
            font-weight:bold;
        }

        #map{
            height:600px;
            width:100%;
            margin-top:20px;
            border-radius:15px;
            border:2px solid #333;
        }

        input{
            background:#222 !important;
            color:white !important;
            border:1px solid #444 !important;
        }

        input::placeholder{
            color:#aaa !important;
        }

    </style>
</head>

<body>

<div class="sidebar">

    <div class="text-center">
        <img src="https://cdn-icons-png.flaticon.com/512/1048/1048953.png"
             width="80"
             class="mb-3">
    </div>

    <h3>🚚 Smart Delivery</h3>

    <a href="/dashboard">🏠 Dashboard</a>

    <a href="/optimize">🚚 Optimize Route</a>


    <a href="/">🚪 Logout</a>

</div>

<div class="content">

    <div class="card shadow p-4">

        <h2 class="mb-4">🚚 Route Optimization</h2>

        <form action="/optimize" method="post">

            <label><b>Source City</b></label>

            <input
                type="text"
                name="source"
                class="form-control"
                placeholder="Enter Source City"
                required>

            <br>

            <label><b>Destination City</b></label>

            <input
                type="text"
                name="destination"
                class="form-control"
                placeholder="Enter Destination City"
                required>

            <br>

            <button type="submit" class="btn btn-black">
                Find Best Route
            </button>

        </form>

        {% if result %}

        <hr class="mt-4">

        <div class="row mt-4">

            <div class="col-md-3">
                <div class="stat-card">
                    <h5>📍 Route</h5>
                    <p>{{ result }}</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="stat-card">
                    <h5>🛣 Distance</h5>
                    <h2>{{ distance }}</h2>
                    <small>KM</small>
                </div>
            </div>

            <div class="col-md-3">
                <div class="stat-card">
                    <h5>⏱ Travel Time</h5>
                    <h2>{{ time_hours }}</h2>
                    <small>Hours</small>
                </div>
            </div>

            <div class="col-md-3">
                <div class="stat-card">
                    <h5>⛽ Fuel Cost</h5>
                    <h2>₹{{ fuel_cost }}</h2>
                </div>
            </div>

        </div>

        <div id="map"></div>

        {% endif %}

    </div>

</div>

{% if start_lat %}

<script>

var map = L.map('map').setView(
[
    {{ start_lat }},
    {{ start_lon }}
],
6
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    maxZoom:18
}
).addTo(map);

// Source Marker
L.marker(
[
    {{ start_lat }},
    {{ start_lon }}
]
)
.addTo(map)
.bindPopup("📍 Source");

// Destination Marker
L.marker(
[
    {{ end_lat }},
    {{ end_lon }}
]
)
.addTo(map)
.bindPopup("🏁 Destination");

// Route Line
var routeLine = L.polyline(
[
    [
        {{ start_lat }},
        {{ start_lon }}
    ],
    [
        {{ end_lat }},
        {{ end_lon }}
    ]
],
{
    color:'red',
    weight:5
}
).addTo(map);

map.fitBounds(routeLine.getBounds());

</script>

{% endif %}

</body>
</html>
