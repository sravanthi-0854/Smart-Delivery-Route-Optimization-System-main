<!DOCTYPE html>
<html>
<head>
    <title>Smart Delivery Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#121212;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial, sans-serif;
        }

        .login-box{
            width:400px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 5px 20px rgba(0,0,0,0.3);
            text-align:center;
        }

        .login-box img{
            width:90px;
            margin-bottom:15px;
        }

        .btn-login{
            background:black;
            color:white;
            width:100%;
        }

        .btn-login:hover{
            background:#333;
            color:white;
        }

    </style>

</head>

<body>

<div class="login-box">

    <img src="https://cdn-icons-png.flaticon.com/512/1048/1048953.png">

    <h2>🚚 Smart Delivery</h2>

    <p>Route Optimization System</p>

    <form action="/dashboard">

        <div class="mb-3">
            <input
                type="text"
                class="form-control"
                placeholder="Username"
                required>
        </div>

        <div class="mb-3">
            <input
                type="password"
                class="form-control"
                placeholder="Password"
                required>
        </div>

        <button type="submit" class="btn btn-login">
            Login
        </button>

    </form>

</div>

</body>
</html>
